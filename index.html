<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoxSiphon | WARNING</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --blood: #ff0040;
            --blood-dark: #cc0033;
            --green: #00ff41;
            --green-dim: rgba(0, 255, 65, 0.12);
            --cyan: #00f0ff;
            --dark: #000000;
            --darker: #030303;
            --white: #ffffff;
            --gray: #4a4a5a;
        }

        body {
            font-family: 'Share Tech Mono', monospace;
            background: var(--dark);
            color: var(--green);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated Background */
        .bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .bg-gradient {
            position: absolute;
            inset: 0;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(255, 0, 64, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 50%, rgba(0, 255, 65, 0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 100%, rgba(0, 240, 255, 0.03) 0%, transparent 40%);
            animation: bgPulse 10s ease-in-out infinite alternate;
        }

        @keyframes bgPulse {
            0% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        /* Grid Floor Effect */
        .grid-floor {
            position: absolute;
            bottom: 0;
            left: -50%;
            width: 200%;
            height: 60%;
            background: 
                linear-gradient(90deg, transparent 49.5%, rgba(0, 255, 65, 0.08) 49.5%, rgba(0, 255, 65, 0.08) 50.5%, transparent 50.5%),
                linear-gradient(0deg, transparent 49.5%, rgba(0, 255, 65, 0.05) 49.5%, rgba(0, 255, 65, 0.05) 50.5%, transparent 50.5%);
            background-size: 80px 80px;
            transform: perspective(500px) rotateX(60deg);
            transform-origin: center bottom;
            mask-image: linear-gradient(to top, black 0%, transparent 70%);
            -webkit-mask-image: linear-gradient(to top, black 0%, transparent 70%);
            animation: gridMove 15s linear infinite;
        }

        @keyframes gridMove {
            0% { background-position: 0 0; }
            100% { background-position: 0 80px; }
        }

        /* Matrix Canvas */
        #matrix {
            position: fixed;
            inset: 0;
            z-index: 1;
            opacity: 0.1;
        }

        /* Overlay Effects */
        .overlay {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 2;
        }

        .vignette {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, transparent 30%, rgba(0,0,0,0.95) 100%);
        }

        .scanline {
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent 0px,
                transparent 2px,
                rgba(0, 255, 65, 0.008) 2px,
                rgba(0, 255, 65, 0.008) 4px
            );
            animation: scanlineScroll 6s linear infinite;
        }

        @keyframes scanlineScroll {
            0% { transform: translateY(0); }
            100% { transform: translateY(8px); }
        }

        /* Main Content */
        .main {
            position: relative;
            z-index: 5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
        }

        /* Top Decoration Line */
        .top-line {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, 
                transparent 0%, 
                var(--blood) 20%, 
                var(--green) 50%, 
                var(--blood) 80%, 
                transparent 100%
            );
            z-index: 10;
            animation: lineGlow 3s ease-in-out infinite;
        }

        @keyframes lineGlow {
            0%, 100% { opacity: 0.7; box-shadow: 0 0 20px var(--blood); }
            50% { opacity: 1; box-shadow: 0 0 40px var(--blood), 0 0 60px var(--green); }
        }

        /* Brand Section */
        .brand-section {
            text-align: center;
            margin-bottom: 50px;
        }

        .brand-icon-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 25px;
        }

        .brand-ring {
            position: absolute;
            inset: -15px;
            border: 1px solid var(--blood);
            border-radius: 50%;
            animation: ringPulse 3s ease-in-out infinite;
        }

        .brand-ring:nth-child(2) {
            inset: -28px;
            animation-delay: 0.5s;
            border-color: var(--green);
            opacity: 0.5;
        }

        .brand-ring:nth-child(3) {
            inset: -42px;
            animation-delay: 1s;
            border-color: var(--cyan);
            opacity: 0.25;
        }

        @keyframes ringPulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.5; }
        }

        .brand-icon {
            width: 72px;
            height: 72px;
            position: relative;
            z-index: 2;
            filter: drop-shadow(0 0 30px var(--blood));
            animation: iconFloat 4s ease-in-out infinite;
        }

        @keyframes iconFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-12px) rotate(3deg); }
        }

        .brand-name {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(32px, 9vw, 68px);
            font-weight: 900;
            letter-spacing: 14px;
            text-transform: uppercase;
            background: linear-gradient(180deg, #fff 0%, var(--green) 50%, #00aa22 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 40px rgba(0, 255, 65, 0.5));
            position: relative;
            animation: brandGlitch 4s infinite;
        }

        @keyframes brandGlitch {
            0%, 94%, 100% { 
                transform: translate(0); 
                filter: drop-shadow(0 0 40px rgba(0, 255, 65, 0.5));
            }
            95% { 
                transform: translate(-4px, 2px); 
                filter: drop-shadow(-4px 0 var(--blood)) drop-shadow(4px 0 var(--cyan));
            }
            96% { 
                transform: translate(4px, -2px); 
                filter: drop-shadow(4px 0 var(--blood)) drop-shadow(-4px 0 var(--cyan));
            }
            97% { 
                transform: translate(-2px, -2px); 
            }
            98% { 
                transform: translate(2px, 2px); 
            }
        }

        .brand-sub {
            font-size: 11px;
            letter-spacing: 8px;
            text-transform: uppercase;
            color: var(--gray);
            margin-top: 16px;
            position: relative;
        }

        .brand-sub::before,
        .brand-sub::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 60px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gray));
        }

        .brand-sub::before {
            right: calc(100% + 16px);
            background: linear-gradient(90deg, transparent, var(--gray));
        }

        .brand-sub::after {
            left: calc(100% + 16px);
            background: linear-gradient(270deg, transparent, var(--gray));
        }

        /* Warning Container */
        .warning-container {
            position: relative;
            max-width: 720px;
            width: 92%;
        }

        /* Corner Decorations */
        .corner {
            position: absolute;
            width: 30px;
            height: 30px;
            border-color: var(--blood);
            border-style: solid;
            border-width: 0;
        }

        .corner-tl { top: -8px; left: -8px; border-top-width: 2px; border-left-width: 2px; }
        .corner-tr { top: -8px; right: -8px; border-top-width: 2px; border-right-width: 2px; }
        .corner-bl { bottom: -8px; left: -8px; border-bottom-width: 2px; border-left-width: 2px; }
        .corner-br { bottom: -8px; right: -8px; border-bottom-width: 2px; border-right-width: 2px; }

        .warning-card {
            background: linear-gradient(145deg, rgba(5, 5, 10, 0.95), rgba(0, 0, 0, 0.98));
            border: 1px solid rgba(255, 0, 64, 0.3);
            border-radius: 4px;
            padding: 50px 44px;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(20px);
        }

        /* Animated Border Glow */
        .warning-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 4px;
            padding: 1px;
            background: linear-gradient(
                135deg,
                var(--blood),
                transparent 40%,
                transparent 60%,
                var(--green)
            );
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            animation: borderRotate 6s linear infinite;
        }

        @keyframes borderRotate {
            0% { background: linear-gradient(0deg, var(--blood), transparent, var(--green)); }
            25% { background: linear-gradient(90deg, var(--blood), transparent, var(--green)); }
            50% { background: linear-gradient(180deg, var(--blood), transparent, var(--green)); }
            75% { background: linear-gradient(270deg, var(--blood), transparent, var(--green)); }
            100% { background: linear-gradient(360deg, var(--blood), transparent, var(--green)); }
        }

        /* Top Glow Line */
        .card-glow-top {
            position: absolute;
            top: 0;
            left: 20%;
            right: 20%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--blood), transparent);
            box-shadow: 0 0 30px var(--blood);
            animation: glowPulse 2s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* Warning Header */
        .warning-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 1px solid rgba(255, 0, 64, 0.2);
        }

        .alert-icon {
            width: 36px;
            height: 36px;
            stroke: var(--blood);
            fill: none;
            stroke-width: 1.5;
            animation: alertBlink 1s steps(2) infinite;
        }

        @keyframes alertBlink {
            0%, 100% { opacity: 1; filter: drop-shadow(0 0 10px var(--blood)); }
            50% { opacity: 0.3; filter: none; }
        }

        .alert-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(13px, 3vw, 17px);
            font-weight: 700;
            letter-spacing: 8px;
            text-transform: uppercase;
            color: var(--blood);
            text-shadow: 0 0 30px var(--blood);
        }

        /* Warning Message */
        .warning-body {
            text-align: center;
        }

        .main-message {
            font-size: clamp(16px, 4vw, 21px);
            line-height: 2;
            color: rgba(255, 255, 255, 0.88);
            margin-bottom: 40px;
            letter-spacing: 0.5px;
        }

        .main-message strong {
            color: var(--blood);
            font-weight: 600;
            text-shadow: 0 0 20px rgba(255, 0, 64, 0.4);
        }

        .sub-message {
            font-size: 13px;
            color: var(--gray);
            letter-spacing: 2px;
            margin-bottom: 38px;
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 32px;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 0, 64, 0.4), transparent);
        }

        .divider-icon {
            width: 12px;
            height: 12px;
            border: 1px solid var(--blood);
            transform: rotate(45deg);
            animation: diamondSpin 4s linear infinite;
        }

        @keyframes diamondSpin {
            0% { transform: rotate(45deg); }
            100% { transform: rotate(405deg); }
        }

        /* Good Bye Section */
        .goodbye-section {
            text-align: center;
        }

        .goodbye-label {
            font-size: 10px;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: var(--gray);
            margin-bottom: 18px;
        }

        .goodbye-main {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(32px, 8vw, 56px);
            font-weight: 900;
            letter-spacing: 10px;
            text-transform: uppercase;
            color: var(--blood);
            text-shadow: 
                0 0 20px var(--blood),
                0 0 60px rgba(255, 0, 64, 0.4),
                0 0 120px rgba(255, 0, 64, 0.2);
            position: relative;
            animation: goodbyeEffect 3s infinite;
        }

        @keyframes goodbyeEffect {
            0%, 91%, 100% {
                text-shadow: 0 0 20px var(--blood), 0 0 60px rgba(255, 0, 64, 0.4);
                transform: scale(1);
            }
            92% {
                text-shadow: 
                    -6px 0 var(--green),
                    6px 0 var(--cyan),
                    0 0 20px var(--blood);
                transform: scale(1.02) skewX(-1deg);
            }
            93% {
                text-shadow: 
                    6px 0 var(--green),
                    -6px 0 var(--cyan),
                    0 0 20px var(--blood);
                transform: scale(0.98) skewX(1deg);
            }
            94% {
                text-shadow: 
                    -4px 0 var(--green),
                    4px 0 var(--cyan);
                transform: scale(1.01);
            }
            95% {
                text-shadow: 
                    4px 0 var(--green),
                    -4px 0 var(--cyan);
                transform: scale(0.99);
            }
        }

        /* Bypass Badge */
        .bypass-container {
            margin-top: 28px;
            display: flex;
            justify-content: center;
        }

        .bypass-badge {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: linear-gradient(135deg, rgba(0, 255, 65, 0.08), rgba(0, 255, 65, 0.02));
            border: 1px solid rgba(0, 255, 65, 0.35);
            padding: 12px 28px;
            border-radius: 2px;
            position: relative;
            overflow: hidden;
        }

        .bypass-badge::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 65, 0.15), transparent);
            animation: badgeShine 3s ease-in-out infinite;
        }

        @keyframes badgeShine {
            0%, 100% { left: -100%; }
            50% { left: 100%; }
        }

        .bypass-dot {
            width: 8px;
            height: 8px;
            background: var(--green);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--green);
            animation: dotPulse 1.2s ease-in-out infinite;
        }

        @keyframes dotPulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.7); }
        }

        .bypass-text {
            font-size: 11px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--green);
            font-weight: 400;
            position: relative;
            z-index: 1;
        }

        /* Terminal Footer */
        .terminal-footer {
            margin-top: 48px;
            text-align: center;
            font-size: 11px;
            color: var(--gray);
            letter-spacing: 2px;
        }

        .terminal-line {
            color: var(--green);
        }

        .cursor {
            display: inline-block;
            width: 8px;
            height: 16px;
            background: var(--green);
            margin-left: 4px;
            vertical-align: middle;
            animation: cursorBlink 1s step-end infinite;
        }

        @keyframes cursorBlink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* Status Bar */
        .status-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 28px;
            background: rgba(0, 0, 0, 0.9);
            border-top: 1px solid rgba(255, 0, 64, 0.2);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            font-size: 10px;
            letter-spacing: 1px;
            z-index: 20;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--gray);
        }

        .status-item span {
            color: var(--blood);
        }

        .status-dot-small {
            width: 6px;
            height: 6px;
            background: var(--green);
            border-radius: 50%;
            animation: statusBlink 2s infinite;
        }

        @keyframes statusBlink {
            0%, 48%, 100% { opacity: 1; }
            50%, 98% { opacity: 0.3; }
        }

        /* Responsive */
        @media (max-width: 640px) {
            .brand-name {
                letter-spacing: 6px;
            }

            .brand-sub::before,
            .brand-sub::after {
                width: 30px;
            }

            .warning-card {
                padding: 36px 26px;
            }

            .corner {
                width: 20px;
                height: 20px;
            }

            .goodbye-main {
                letter-spacing: 5px;
            }

            .status-bar {
                padding: 0 12px;
                font-size: 9px;
            }

            .status-bar .status-item:last-child {
                display: none;
            }
        }
    </style>
</head>
<body>

<!-- Background Layer -->
<div class="bg-layer">
    <div class="bg-gradient"></div>
    <div class="grid-floor"></div>
</div>

<!-- Matrix Rain -->
<canvas id="matrix"></canvas>

<!-- Overlays -->
<div class="overlay">
    <div class="vignette"></div>
    <div class="scanline"></div>
</div>

<!-- Top Line -->
<div class="top-line"></div>

<!-- Main Content -->
<main class="main">

    <!-- Brand -->
    <section class="brand-section">
        <div class="brand-icon-wrapper">
            <div class="brand-ring"></div>
            <div class="brand-ring"></div>
            <div class="brand-ring"></div>
            <svg class="brand-icon" viewBox="0 0 24 24" fill="none" stroke="#ff0040" stroke-width="1.2">
                <path d="M12 2C6.48 2 2 6.48 2 12c0 3.69 2.47 6.86 6 8.25V22h8v-1.75c3.53-1.39 6-4.56 6-8.25 0-5.52-4.48-10-10-10z"/>
                <circle cx="9" cy="10" r="1.5" fill="#ff0040"/>
                <circle cx="15" cy="10" r="1.5" fill="#ff0040"/>
                <path d="M12 14c-1.5 0-3 0.5-3 1.5h6c0-1-1.5-1.5-3-1.5z" fill="#ff0040"/>
            </svg>
        </div>

        <h1 class="brand-name">NOXSIPHON</h1>
        <p class="brand-sub">Security Division</p>
    </section>

    <!-- Warning Card -->
    <div class="warning-container">
        <!-- Corner Decorations -->
        <div class="corner corner-tl"></div>
        <div class="corner corner-tr"></div>
        <div class="corner corner-bl"></div>
        <div class="corner corner-br"></div>

        <div class="warning-card">
            <div class="card-glow-top"></div>

            <!-- Header -->
            <div class="warning-header">
                <svg class="alert-icon" viewBox="0 0 24 24">
                    <path d="M12 2L2 22h20L12 2z" fill="rgba(255,0,64,0.1)" stroke="currentColor"/>
                    <line x1="12" y1="9" x2="12" y2="14" stroke="currentColor" stroke-width="2"/>
                    <circle cx="12" cy="18" r="1" fill="currentColor"/>
                </svg>
                <span class="alert-title">System Alert</span>
            </div>

            <!-- Message Body -->
            <div class="warning-body">
                <p class="main-message">
                    আপনি কারো ক্ষতি করতে চাইলে<br>সব সময় নিজের ক্ষতি হবে।
                </p>

                <p class="sub-message">
                    [ ALL ACTIVITIES ARE BEING LOGGED AND TRACED ]
                </p>

                <!-- Divider -->
                <div class="divider">
                    <div class="divider-line"></div>
                    <div class="divider-icon"></div>
                    <div class="divider-line"></div>
                </div>

                <!-- Good Bye Section -->
                <div class="goodbye-section">
                    <p class="goodbye-label">// Terminal Response //</p>
                    <p class="goodbye-main">Good Bye</p>

                    <div class="bypass-container">
                        <div class="bypass-badge">
                            <span class="bypass-dot"></span>
                            <span class="bypass-text">Hacker Bypass Activated</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Terminal Footer -->
    <footer class="terminal-footer">
        <span class="terminal-line">root@noxsiphon:~$</span> connection_terminated<span class="cursor"></span>
    </footer>

</main>

<!-- Status Bar -->
<div class="status-bar">
    <div class="status-item">
        <span class="status-dot-small"></span>
        TRACE: <span id="traceIP">192.168.X.XXX</span>
    </div>
    <div class="status-item">
        STATUS: <span>LOCKED</span>
    </div>
    <div class="status-item">
        LOG: <span id="logTime">--:--:--</span>
    </div>
</div>

<script>
    // Matrix Rain Effect
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    const chars = '01アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン';
    const charArray = chars.split('');
    const fontSize = 13;
    let columns = Math.floor(canvas.width / fontSize);
    let drops = Array(columns).fill().map(() => Math.random() * -100);

    function drawMatrix() {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.04)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.font = `${fontSize}px monospace`;

        for (let i = 0; i < drops.length; i++) {
            const char = charArray[Math.floor(Math.random() * charArray.length)];
            const x = i * fontSize;
            const y = drops[i] * fontSize;

            // Brighter at bottom
            const brightness = Math.min(1, (y / canvas.height) * 1.5);
            ctx.fillStyle = `rgba(0, 255, 65, ${brightness * 0.7})`;
            
            ctx.fillText(char, x, y);

            if (y > canvas.height && Math.random() > 0.97) {
                drops[i] = 0;
            }
            drops[i] += 0.5;
        }
    }

    setInterval(drawMatrix, 35);

    // IP Generator
    function generateIP() {
        return `${Math.floor(Math.random()*223)+1}.${Math.floor(Math.random()*256)}.${Math.floor(Math.random()*256)}.${Math.floor(Math.random()*256)}`;
    }

    document.getElementById('traceIP').textContent = generateIP();

    setInterval(() => {
        if (Math.random() > 0.6) {
            document.getElementById('traceIP').textContent = generateIP();
        }
    }, 2500);

    // Live Clock
    function updateClock() {
        const now = new Date();
        const time = now.toTimeString().split(' ')[0];
        document.getElementById('logTime').textContent = time;
    }
    updateClock();
    setInterval(updateClock, 1000);
